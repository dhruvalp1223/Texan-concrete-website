<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" />
    <meta charset="utf-8">
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <script defer src="js/script.js"></script>
</head>
    


<div class="col-sm-10" id="container">
    <h1 class="form-title">Get A Quote</h1>
    <form action="#" id="quoteForm">
        <div class="main-user-info">
            <div class="user-input-box">
                <label for="Name">Name <span>(required)</span></label>
                <input type="text" id="Name" name="Name" placeholder="Enter Name" required />
            </div>
            <div class="user-input-box">
                <label for="Email">Email <span>(required)</span></label>
                <input type="email" id="Email" name="Email" placeholder="Enter Email" required />
            </div>
            <div class="user-input-box">
                <label for="Phone">Phone</label>
                <input type="tel" id="Phone" name="Phone" placeholder="Enter Phone" />
            </div>
            <div class="user-input-box">
                <label for="City">City <span>(required)</span></label>
                <input type="text" id="City" name="City" placeholder="Enter City" required />
            </div>
            <div class="user-input-box">
                <label for="Typerequired">Type <span>(required)</span></label>
                <div class="styled-select">
                    <select id="Typerequired" name="Typerequired" required>
                        <option value="" disabled selected>Select Type</option>
                        <option value="Commercial">Commercial</option>
                        <option value="Residential">Residential</option>
                    </select>
                </div>
            </div>
            <div class="user-input-box">
                <label for="Requirements">Requirements</label>
                <textarea id="Requirements" name="Requirements" placeholder="Enter your Requirements"></textarea>
            </div>
            <div class="user-input-box">
                <button type="submit" class="btn btn-success center-btn" id="send" name="send">Send</button>
            </div>
        </div>
    </form>
</div>


<script>
    document.getElementById('quoteForm').addEventListener('submit', function (event) {
        var form = event.target;
        var inputs = form.querySelectorAll('input[required], textarea[required]');
        var isValid = true;

        inputs.forEach(function (input) {
            if (!input.value.trim()) {
                input.classList.add('error');
                isValid = false;
            } else {
                input.classList.remove('error');
            }
        });

        if (!isValid) {
            alert('Please fill in all required fields.');
            event.preventDefault(); // Prevent form submission if validation fails
        } else {
            alert('Form submitted successfully!');
            // Simulating form submission since we can't actually submit in this environment
            // form.submit();
        }
    });
</script>
