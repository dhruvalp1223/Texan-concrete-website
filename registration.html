<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Design by foolishdeveloper.com -->
    <title>Texas Concrete Registration</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <style>
        *,
        *:before,
        *:after {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #48568f;
        }

        .background {
            width: 430px;
            height: 520px;
            position: absolute;
            transform: translate(-50%, -50%);
            left: 50%;
            top: 50%;
        }

        .background .shape {
            height: 200px;
            width: 200px;
            position: absolute;
            border-radius: 50%;
        }

        .shape:first-child {
            background: linear-gradient(#1845ad,
                    #23a2f6);
            left: -80px;
            top: -80px;
        }

        .shape:last-child {
            background: linear-gradient(to right,
                    #a36104,
                    #b69567);
            right: -30px;
            bottom: -80px;
        }

        form {
          margin-top:50px ;
            width: 400px;
            background-color: rgba(255, 255, 255, 0.13);
            position: absolute;
            transform: translate(-50%, -50%);
            top: 43%;
            left: 48%;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 40px rgba(8, 7, 16, 0.6);
            padding: 30px 35px;
        }
a{
    text-decoration: none;
}
        form * {
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            letter-spacing: 0.5px;
            outline: none;
            border: none;
        }

        form h3 {
            font-size: 32px;
            font-weight: 500;
            line-height: 42px;
            text-align: center;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            font-weight: 500;
        }

        input {
            display: block;
            height: 50px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.07);
            border-radius: 3px;
            padding: 0 10px;
            margin-top: 8px;
            font-size: 14px;
            font-weight: 300;
        }

        ::placeholder {
            color: #e5e5e5;
        }

        button {
            margin-top:10px;
            width: 100%;
            background-color: #ffffff;
            color: #080710;
            padding: 15px 0;
            font-size: 18px;
            font-weight: 600;
            border-radius: 5px;
            cursor: pointer;
        }

        .error-message {
            color: red;
            margin-top: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="background">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>
    <form id="registration-form">
        <h3>Texas Concrete Registration</h3>

        <label for="fullname">Full Name</label>
        <input type="text" placeholder="Full Name" id="fullname">

        <label for="email">Email</label>
        <input type="email" placeholder="Email" id="email">

        <label for="phone">Phone Number</label>
        <input type="text" placeholder="Phone Number" id="phone">

        <label for="password">Password</label>
        <input type="password" placeholder="Password" id="password">

        <div class="error-message" id="error-message"></div>

        <button type="button" id="register-btn"><a href="login.html" style="color: black;">Register</a></button>
    </form>

    <script>
        document.getElementById('register-btn').addEventListener('click', function() {
            var fullname = document.getElementById('fullname').value.trim();
            var email = document.getElementById('email').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorMessage = document.getElementById('error-message');

            if (fullname === '' || email === '' || phone === '' || password === '') {
                errorMessage.textContent = 'Please fill out all fields.';
            } else {
                // You can add your registration logic here
                errorMessage.textContent = ''; // Clear error message if all fields are filled
                // For demonstration purpose, alert registration success
                alert('Registration successful!');
                // You can redirect the user to another page or perform any other action upon successful registration
            }
        });
    </script>
</body>

</html>
