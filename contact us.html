<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.2/css/all.min.css" />
    <meta charset="utf-8">
    <link href='https://unpkg.com/boxicons@2.0.7/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="style.css">
    <script defer src="js/script.js"></script>
</head>

<body>

    <div id="header"></div>
    <script src="/script.js"></script>


    <section class="aboutsection">
        <div class="aboutsection1main">
            <div class="aboutsection1part1">
                <div class="aboutsectionpart1heading">
                    <h1 class="aboutsection1part1heading1">
                        Contact Us
                    </h1>
                </div>
            </div>
        </div>
    </section>

    <section class="aboutsection2">
        <div class="container">
            <div class="row">
                <div class="col-md-9" style="padding:0px;margin: auto;">
                    <div class="row">
                        <h3 class="aboutsection2heading">
                            <i class="fas fa-truck-loading"></i> Houston Ready Mix Concrete Supply
                        </h3>
                        <label>
                            Phone: 713-255-3333
                        </label>
                        <br>
                        <label>
                            Fax: 713-255-2800
                        </label>

                        <div class="row" style="padding-top:40px; margin: auto;">
                            <div class="col-sm-6" id="location1">
                                <div id="loc1" class="location-container">
                                    <p class="location-address">
                                        6001 Homestead Rd <br>
                                        Houston, TX 77028
                                    </p>
                                    <iframe
                                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3461.7419548724756!2d-95.30574518726131!3d29.813998474936362!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8640bbd111be0189%3A0xd0d6f1118a0f30!2s6001%20Homestead%20Rd%2C%20Houston%2C%20TX%2077028!5e0!3m2!1sen!2sus!4v1683664682884!5m2!1sen!2sus"
                                        class="location-map" allowfullscreen="" loading="lazy"
                                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                                </div>
                            </div>
                            <div class="col-sm-6" id="location1">
                                <div id="loc2" class="location-container">
                                    <p class="location-address">
                                        21990 FM 1314 <br>
                                        Porter, TX 77365
                                    </p>
                                    <iframe
                                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3461.7419548724756!2d-95.30574518726131!3d29.813998474936362!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8640bbd111be0189%3A0xd0d6f1118a0f30!2s6001%20Homestead%20Rd%2C%20Houston%2C%20TX%2077028!5e0!3m2!1sen!2sus!4v1683664682884!5m2!1sen!2sus"
                                        class="location-map" allowfullscreen="" loading="lazy"
                                        referrerpolicy="no-referrer-when-downgrade"></iframe>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <div class="col-md-3">
                    <div id="get a quote"></div>
                </div>
            </div>
        </div>
    </section>
    <div id="footer"></div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("header.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("header").innerHTML = data;
                })
                .catch(error => {
                    console.error("Error fetching header:", error);
                });
        });



        document.addEventListener("DOMContentLoaded", function () {
            fetch("footer.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("footer").innerHTML = data;
                })
                .catch(error => {
                    console.error("Error fetching footer:", error);
                });
        });
        document.addEventListener("DOMContentLoaded", function () {
            fetch("get a quote.html")
                .then(response => response.text())
                .then(data => {
                    document.getElementById("get a quote").innerHTML = data;
                })
                .catch(error => {
                    console.error("Error fetching get a quote:", error);
                });
        });
    </script>

</body>
